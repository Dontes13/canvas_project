{% extends "layout.html" %}

{% block content %}

<div class="focusedlist-section">
    <div class="container">
        <div class="row justify-content-center gap-5">
            <div class="col-md-4">
                <h2 class="fw-bold mb-4 newsreader">What's Most Urgent</h2>
                {% for course in courses %}
                <div class="card mb-4 p-3">
                    <h5>#{{ loop.index}} - {{ course.name }}</h5>
                    <p>{{ course.assignment}}</p>
                    <p>Grade Weight: {{ course.weight}}%</p>
                </div>
                {% endfor %}
            </div>
</div>

<a href="{{ url_for('export_calendar') }}" class="btn btn-dark mt-3 px-5 py-3">Export</a>




{% endblock %}
